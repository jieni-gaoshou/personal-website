<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 背景圆 -->
  <circle cx="32" cy="32" r="30" fill="#0A0A0A" stroke="#8B5CF6" stroke-width="2"/>
  <circle cx="32" cy="32" r="26" fill="#1A1A2E" opacity="0.5"/>

  <!-- 轨道环 -->
  <ellipse cx="32" cy="32" rx="22" ry="8" stroke="#6366F1" stroke-width="0.8" opacity="0.6" transform="rotate(-20 32 32)"/>
  <ellipse cx="32" cy="32" rx="22" ry="8" stroke="#8B5CF6" stroke-width="0.5" opacity="0.3" transform="rotate(25 32 32)"/>

  <!-- 中心星体 -->
  <circle cx="32" cy="32" r="6" fill="#8B5CF6" opacity="0.9"/>
  <circle cx="32" cy="32" r="4" fill="#A78BFA"/>
  <circle cx="32" cy="32" r="2" fill="#fff"/>

  <!-- 卫星 -->
  <circle cx="18" cy="24" r="2.5" fill="#6366F1"/>
  <circle cx="18" cy="24" r="1.2" fill="#A5B4FC"/>

  <!-- 小星星 -->
  <circle cx="48" cy="16" r="1" fill="#8B5CF6" opacity="0.7"/>
  <circle cx="52" cy="28" r="0.8" fill="#6366F1" opacity="0.5"/>
  <circle cx="44" cy="44" r="0.6" fill="#A78BFA" opacity="0.4"/>
  <circle cx="14" cy="46" r="0.8" fill="#6366F1" opacity="0.5"/>

  <!-- 发光效果 -->
  <circle cx="32" cy="32" r="14" fill="url(#glow)" opacity="0.15"/>

  <defs>
    <radialGradient id="glow" cx="32" cy="32" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
